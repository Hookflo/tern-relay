name = "tern-relay"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Override this after deployment if you want a stable public URL in connect responses.
RELAY_PUBLIC_BASE_URL = "https://tern-relay.hookflo-tern.workers.dev"

[durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionDurableObject" }
]

# ── If you already deployed with tag "v1", bump to "v2" here
# ── If deploying fresh, "v1" is fine
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDurableObject"]
