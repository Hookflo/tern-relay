name = "tern-relay"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionDurableObject" }
]

# ── If you already deployed with tag "v1", bump to "v2" here
# ── If deploying fresh, "v1" is fine
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDurableObject"]

# ── Uncomment and fill in after setting up custom domain in CF dashboard
# [[routes]]
# pattern = "relay.yourdomain.com/*"
# zone_name = "yourdomain.com"
