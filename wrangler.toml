name = "tern-relay"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["SessionDurableObject"]

# ── Custom domain ─────────────────────────────────────────────────────────────
# Set up wildcard subdomain in Cloudflare dashboard:
#   *.relay.tern.dev  →  this Worker
#    relay.tern.dev   →  this Worker  (CLI connects here for WS upgrade)
#
# Uncomment after domain is configured:
# [[routes]]
# pattern = "relay.tern.dev/*"
# zone_name = "tern.dev"
#
# [[routes]]
# pattern = "*.relay.tern.dev/*"
# zone_name = "tern.dev"

# ── Local dev ─────────────────────────────────────────────────────────────────
# wrangler dev binds to localhost:8787
# CLI: RELAY_URL=ws://localhost:8787 npx @hookflo/tern-dev --port 3000
